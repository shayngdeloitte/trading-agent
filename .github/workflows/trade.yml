name: Trading Session

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 10:00 AM ET = 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv sendgrid

      - name: Run trade phase
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}
        run: python agent.py trade

      - name: Commit journal and cache
        run: |
          git config user.name "trading-agent"
          git config user.email "agent@noreply.github.com"
          git add journal/
          git diff --cached --quiet || git commit -m "Trades: $(date -u '+%Y-%m-%d')"
          git push
