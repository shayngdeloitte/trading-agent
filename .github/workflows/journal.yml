name: End of Day Journal

on:
  schedule:
    - cron: '15 20 * * 1-5'  # 4:15 PM ET = 20:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv sendgrid

      - name: Run journal phase
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
        run: python agent.py journal

      - name: Commit final journal
        run: |
          git config user.name "trading-agent"
          git config user.email "agent@noreply.github.com"
          git add journal/
          git diff --cached --quiet || git commit -m "Journal: $(date -u '+%Y-%m-%d')"
          git push
